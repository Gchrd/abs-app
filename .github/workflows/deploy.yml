name: Deploy ABS to VM (Local Network)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Build and Restart Docker
        run: |
          cd /opt/abs-app
          git pull origin main
          docker compose down
          docker compose build --no-cache
          docker compose up -d
          docker compose ps
